name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: gymquest-production
  cancel-in-progress: false

env:
  DOTNET_VERSION: 10.0.x
  NODE_VERSION: 24
  GYMQUEST_HOST_PORT: 5020

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore backend
        run: dotnet restore GymChall.sln

      - name: Test backend
        run: dotnet test GymChall.sln --configuration Release --no-restore

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Test frontend
        working-directory: web
        run: npm test

      - name: Build frontend
        working-directory: web
        run: npm run build

  build-image:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: test

    outputs:
      image: ${{ steps.image.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest

  deploy:
    name: Deploy
    runs-on:
      - self-hosted
      - gymquest
    needs: build-image
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        shell: bash
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Prepare deploy directory
        shell: bash
        run: |
          mkdir -p /opt/gymquest/deploy /opt/gymquest/data /opt/gymquest/keys
          cp deploy/docker-compose.yml /opt/gymquest/deploy/docker-compose.yml
          test -f /opt/gymquest/gymquest.env

      - name: Deploy container
        working-directory: /opt/gymquest/deploy
        shell: bash
        env:
          GYMQUEST_IMAGE: ${{ needs.build-image.outputs.image }}:${{ github.sha }}
          GYMQUEST_HOST_PORT: ${{ env.GYMQUEST_HOST_PORT }}
        run: docker compose up -d --pull always

      - name: Verify local health
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl -fsS "http://127.0.0.1:${{ env.GYMQUEST_HOST_PORT }}/health"; then
              exit 0
            fi

            echo "GymQuest is not ready yet. Attempt ${attempt}/30."
            sleep 2
          done

          docker ps -a --filter name=gymquest
          docker logs gymquest --tail 120
          exit 1
